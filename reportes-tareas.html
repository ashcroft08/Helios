<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <script>
        (function () {
            const theme = localStorage.getItem('helios-theme') || 'light';
            document.documentElement.className = theme;
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helios - Reporte de Tareas</title>
    <link rel="icon" type="image/svg+xml" href="img/favicon_helios.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://npmcdn.com/flatpickr/dist/l10n/es.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <!-- PDF Generation Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3b82f6",
                        "primary-hover": "#2563eb",
                        success: "#10b981",
                        warning: "#f59e0b",
                        danger: "#ef4444",
                        info: "#06b6d4",
                        "background-light": "#f8fafc",
                        "background-dark": "#0a0f1a",
                        "surface-dark": "#111827",
                        "card-dark": "#1e293b",
                        "sidebar-dark": "#0f172a",
                        accent: "#8b5cf6",
                    },
                    fontFamily: { display: ["Inter", "sans-serif"] },
                    borderRadius: { DEFAULT: "0.75rem" },
                },
            },
        };
    </script>
    <link rel="stylesheet" href="css/ui.css">
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <div class="flex min-h-screen">
        <main class="flex-1 overflow-y-auto">
            <!-- Header -->
            <header class="p-6 lg:px-10 flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Reporte de Tareas</h2>
                    <p class="text-slate-500 dark:text-slate-400 mt-1">Actividades realizadas registradas desde la app.</p>
                </div>
                <div>
                    <button onclick="exportarPDF()"
                        class="bg-primary hover:bg-primary-hover text-white px-6 py-2.5 rounded-xl font-semibold transition-all flex items-center gap-2 shadow-lg shadow-blue-500/20">
                        <span class="material-icons-outlined">picture_as_pdf</span> Exportar PDF
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="px-6 lg:px-10 mb-8">
                <div
                    class="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-wrap gap-4 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Desde</label>
                        <input type="date" id="desde" placeholder="Seleccione fecha"
                            class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-primary focus:border-primary">
                    </div>
                    <div class="flex-1 min-w-[200px]">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Hasta</label>
                        <input type="date" id="hasta" placeholder="Seleccione fecha"
                            class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 rounded-xl focus:ring-primary focus:border-primary">
                    </div>
                    <div class="flex-1 min-w-[200px] relative" id="dropdown-sucursal-container">
                        <label class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 block">Sucursal</label>
                        <button type="button" onclick="toggleDropdownSucursal()" id="btn-sucursal-filtro"
                            class="w-full flex items-center justify-between bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2.5 text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                            <span id="selected-sucursal-text">Todas las Sucursales</span>
                            <span class="material-icons-outlined text-slate-400">expand_more</span>
                        </button>

                        <div id="dropdown-sucursal-menu"
                            class="hidden absolute left-0 mt-2 w-full origin-top-left rounded-xl bg-white dark:bg-slate-800 shadow-xl border border-slate-200 dark:border-slate-700 z-50 overflow-hidden">
                            <div class="py-1 max-h-60 overflow-y-auto" id="sucursal-options">
                                <!-- Options injected here -->
                            </div>
                        </div>
                        <input type="hidden" id="filtro-sucursal" value="">
                    </div>
                    <button onclick="applyFilters()"
                        class="bg-slate-900 dark:bg-primary text-white px-8 py-2.5 rounded-xl font-semibold hover:opacity-90 transition-all">
                        Filtrar
                    </button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="px-6 lg:px-10 mb-6">
                <div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center gap-4">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest whitespace-nowrap">Buscar:</label>
                    <div class="flex-1 relative">
                        <input type="text" id="buscar-reporte" oninput="applyFilters()" placeholder="Escribe para filtrar por actividad, usuario o sucursal..."
                            class="w-full bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 rounded-xl px-4 py-2 text-sm focus:ring-primary focus:border-primary">
                    </div>
                    <div class="text-xs text-slate-400 font-medium whitespace-nowrap">
                        <span id="resultados-count">0</span> resultados encontrados
                    </div>
                </div>
            </div>

            <!-- Table Card -->
            <div class="px-6 lg:px-10 mb-10">
                <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left" id="tabla-reportes">
                            <thead class="bg-slate-50 dark:bg-slate-900/50">
                                <tr>
                                    <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Usuario</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Sucursal</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Fecha</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Actividad</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-center">Fotos</th>
                                    <th class="px-6 py-4 text-xs font-semibold text-slate-500 uppercase tracking-wider text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-100 dark:divide-slate-700" id="reportes-tbody">
                                <!-- Data injected here -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Loading State -->
                    <div id="loading-state" class="py-20 text-center">
                        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary mx-auto"></div>
                        <p class="text-slate-500 mt-4 font-medium">Cargando actividades...</p>
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="hidden py-20 text-center">
                        <span class="material-icons-outlined text-6xl text-slate-200 dark:text-slate-700 mb-4">search_off</span>
                        <h3 class="text-lg font-semibold text-slate-500 dark:text-slate-400">No se encontraron reportes</h3>
                        <p class="text-slate-400 mt-1">Intenta ajustando los filtros o el término de búsqueda</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Image Gallery Modal (keep this as it's useful) -->
    <div id="image-modal"
        class="fixed inset-0 z-[150] hidden items-center justify-center bg-black/90 p-4 transition-opacity">
        <button onclick="closeImageModal()" class="absolute top-4 right-4 text-white hover:text-gray-300 z-[160]">
            <span class="material-icons-outlined text-3xl">close</span>
        </button>
        <div class="relative max-w-5xl w-full flex items-center justify-center">
            <button onclick="prevImage()" id="btn-prev-img"
                class="absolute left-0 text-white hover:bg-white/20 rounded-full p-2 hidden">
                <span class="material-icons-outlined text-4xl">chevron_left</span>
            </button>
            <img id="modal-img-element" src="" alt="Vista ampliada" class="max-h-[85vh] max-w-full rounded-lg object-contain">
            <button onclick="nextImage()" id="btn-next-img"
                class="absolute right-0 text-white hover:bg-white/20 rounded-full p-2 hidden">
                <span class="material-icons-outlined text-4xl">chevron_right</span>
            </button>
        </div>
        <div id="img-counter" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white bg-black/50 px-3 py-1 rounded-full text-sm font-medium">
            1 / 1
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] space-y-3"></div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/auth-guard.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/reportes-tareas.js"></script>
</body>

</html>
